# Example values for installing Outage Track standalone via the rcv-module chart.
#   helm install outage-track oci://ghcr.io/root-chain-ventures-llc/helm/rcv-module \
#     --version 0.1.0 -n rcv -f values.example.yaml
# (Assumes the NOC Portal is already running in the same namespace as `rcv-noc-portal`.)

moduleName: outage-track
image:
  repository: ghcr.io/root-chain-ventures-llc/outage-track
  tag: "latest"            # or pin to v0.1.0
containerPort: 3000
healthPath: /api/health

postgres:
  enabled: true            # in-chart PostgreSQL; set false to use your own
  user: outagelog
  database: outagelog
  password: "REPLACE_WITH_PG_PASSWORD"

databaseUrlEnv: DATABASE_URL
databaseUrlTemplate: "postgresql://outagelog:$(POSTGRES_PASSWORD)@{{host}}:5432/outagelog?schema=public"

env:
  NEXTAUTH_URL: "https://outage.example.com"
  PORTAL_URL: "http://rcv-noc-portal:8000"
  PORTAL_OIDC_ISSUER: "https://noc.example.com"
  PORTAL_OIDC_CLIENT_ID: "outage-track"

secretEnv:
  NEXTAUTH_SECRET: "REPLACE_WITH_NEXTAUTH_SECRET"
  PORTAL_API_KEY: "REPLACE_WITH_PORTAL_API_KEY"
  PORTAL_OIDC_CLIENT_SECRET: "REPLACE_WITH_OIDC_CLIENT_SECRET"

ingress:
  enabled: true
  host: outage.example.com
